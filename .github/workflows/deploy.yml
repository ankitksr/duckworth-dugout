name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package*.json'
      - 'frontend/astro.config.*'
      - 'frontend/tsconfig.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      # ── Restore API data from last pipeline sync ─────────────
      - name: Restore API data cache
        id: api-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Seed sample data (fallback)
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p frontend/public/api/ipl/war-room
          cp data/sample/*.json frontend/public/api/ipl/war-room/

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
