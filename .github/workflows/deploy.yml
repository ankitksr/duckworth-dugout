name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package*.json'
      - 'frontend/astro.config.*'
      - 'frontend/tsconfig.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # ── Restore API data from last pipeline sync ─────────────
      - name: Restore API data cache
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Seed sample data (fallback)
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          cd ..
          pip install uv && uv sync
          uv run python -m pipeline seed-sample

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
