name: Sync Pipeline & Deploy

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

# Triggered exclusively via workflow_dispatch by the Cloudflare Worker
# in cloudflare/worker.js. Worker dispatches one of three shapes:
#   - tiers=live,hot   (every 30 min during match window)
#   - tiers=hot        (hourly off-peak)
#   - tiers=all        (every 4h, full sync warm+cool)
# GH Actions cron is removed because it drifts 10-40 min randomly.
on:
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tier or panel list passed to `pipeline sync` (e.g. live, hot, live,hot, all). Leave empty for auto.'
        required: false
        type: string
        default: ''
      panel:
        description: 'Single panel to sync (e.g. briefing, standings). Overrides tiers.'
        required: false
        type: string
        default: ''
      update_cricket_db:
        description: 'Run duckworth-mcp update+enrich before sync'
        required: false
        type: boolean
        default: false
      force:
        description: 'Bypass pipeline caches'
        required: false
        type: boolean
        default: false

concurrency:
  # Shared with live-update.yml so both workflows serialize on the
  # api-data cache. cancel-in-progress: false means concurrent runs
  # queue rather than cancel — we never want to drop a deploy.
  group: pipeline-deploy
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      what: ${{ steps.tier.outputs.what }}
      update_db: ${{ steps.tier.outputs.update_db }}
      force: ${{ steps.tier.outputs.force }}
    steps:
      - name: Resolve sync target from inputs
        id: tier
        run: |
          # Single panel override — used for targeted reruns. Note:
          # single-panel runs can ship stale schedule/standings if
          # the cache is old. Prefer tier-based dispatch.
          if [ -n "${{ inputs.panel }}" ]; then
            echo "what=${{ inputs.panel }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tiers }}" ]; then
            # Auto-prefix "live," if the requested tiers don't
            # already include it or "all". Hot-only and warm-only
            # runs would otherwise build and deploy whatever
            # schedule.json was in the restored api-data cache —
            # which can be hours stale if the last warm/cool run
            # predates a match end. Always refreshing the live
            # panels in the same run closes that gap.
            TIERS="${{ inputs.tiers }}"
            case ",${TIERS}," in
              *,all,*|*,live,*) WHAT="${TIERS}" ;;
              *) WHAT="live,${TIERS}" ;;
            esac
            echo "what=${WHAT}" >> "$GITHUB_OUTPUT"
          else
            # Manual run with no inputs — default to a full sync
            echo "what=all" >> "$GITHUB_OUTPUT"
          fi
          echo "update_db=${{ inputs.update_cricket_db || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "force=${{ inputs.force || 'false' }}" >> "$GITHUB_OUTPUT"

  sync-and-deploy:
    needs: resolve
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ── Python + pipeline ────────────────────────────────────────
      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install pipeline dependencies
        run: uv sync

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # ── cricket.duckdb (from duckworth-mcp) ──────────────────────
      - name: Restore cricket.duckdb cache
        uses: actions/cache/restore@v4
        with:
          path: data/cricket.duckdb
          key: cricket-db
          restore-keys: cricket-db

      - name: Bootstrap cricket.duckdb (first run)
        if: hashFiles('data/cricket.duckdb') == ''
        run: |
          uv pip install "duckworth-mcp @ git+https://github.com/ankitksr/duckworth-mcp.git"
          uv run duckworth-mcp ingest --db data/cricket.duckdb
        timeout-minutes: 5

      - name: Update cricket.duckdb
        if: needs.resolve.outputs.update_db == 'true'
        run: |
          uv pip install "duckworth-mcp @ git+https://github.com/ankitksr/duckworth-mcp.git"
          uv run duckworth-mcp update --db data/cricket.duckdb
          uv run duckworth-mcp enrich --db data/cricket.duckdb
        timeout-minutes: 3

      # ── enrichment.duckdb (articles, wire, snapshots) ────────────
      - name: Restore enrichment.duckdb cache
        uses: actions/cache/restore@v4
        with:
          path: data/enrichment.duckdb
          key: enrichment-db
          restore-keys: enrichment-db

      # ── Restore prior panel data (partial syncs layer on top) ───
      - name: Restore API data from last sync
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Seed data/war-room from cached API data
        run: |
          mkdir -p data/war-room
          cp -a frontend/public/api/ipl/war-room/*.json data/war-room/ 2>/dev/null || true

      # ── Pipeline sync ────────────────────────────────────────────
      # Single positional arg WHAT — accepts tier names (live, hot,
      # warm, cool, all) and/or panel names. Live panels always run
      # first per PANEL_ORDER so downstream LLM panels read fresh state.
      - name: Sync pipeline (${{ needs.resolve.outputs.what }})
        env:
          CT_LLM_API_KEY: ${{ secrets.CT_LLM_API_KEY }}
          CT_LLM_VERTEX: 'true'
          CT_LLM_GCP_PROJECT: ${{ vars.CT_LLM_GCP_PROJECT }}
          CT_LLM_GCP_LOCATION: ${{ vars.CT_LLM_GCP_LOCATION }}
          CT_LLM_MODEL: ${{ vars.CT_LLM_MODEL }}
          CT_LLM_MODEL_PRO: ${{ vars.CT_LLM_MODEL_PRO }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.CT_LLM_GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.CT_LLM_GCP_LOCATION }}
          CRICKET_DB_PATH: data/cricket.duckdb
        run: |
          ARGS="${{ needs.resolve.outputs.what }}"
          if [ "${{ needs.resolve.outputs.force }}" = "true" ]; then
            uv run python -m pipeline sync "$ARGS" --force
          else
            uv run python -m pipeline sync "$ARGS"
          fi
        timeout-minutes: 10

      # ── Cache pipeline output ───────────────────────────────────
      # GitHub Actions cache is immutable — delete then re-save to update
      - name: Update enrichment.duckdb cache
        run: |
          gh cache delete enrichment-db || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save enrichment.duckdb cache
        uses: actions/cache/save@v4
        with:
          path: data/enrichment.duckdb
          key: enrichment-db

      # Persist enrichment DB as a downloadable release asset.
      # This ensures wire history, articles, and snapshots survive
      # cache eviction and are queryable locally.
      - name: Upload enrichment.duckdb to release
        run: |
          TAG="data-snapshot"
          # Create the release if it doesn't exist (idempotent)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Data Snapshot" \
              --notes "Rolling snapshot of pipeline databases. Updated on each sync." \
              --latest=false
          # Upload (overwrite) the enrichment DB
          gh release upload "$TAG" data/enrichment.duckdb --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update API data cache
        run: |
          gh cache delete api-data || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save API data cache
        uses: actions/cache/save@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data

      - name: Update cricket.duckdb cache
        if: needs.resolve.outputs.update_db == 'true'
        run: |
          gh cache delete cricket-db || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save cricket.duckdb cache
        if: needs.resolve.outputs.update_db == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/cricket.duckdb
          key: cricket-db

      # ── Frontend build + deploy ──────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          ASTRO_BASE: /duckworth-dugout
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── Cloudflare Pages (parallel deploy — same commit, root base path) ──
      - name: Rebuild frontend for Cloudflare (root base)
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=duckworth-dugout --branch=main

      # Cache the Cloudflare-shaped dist (root base, no /duckworth-dugout
      # prefix) so live-update can overlay fresh JSON and re-deploy
      # without rebuilding Astro. Updated on every sync-deploy run via
      # delete-then-save (cache is immutable per key).
      - name: Update dist cache
        run: gh cache delete dist-cf || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save dist cache
        uses: actions/cache/save@v4
        with:
          path: frontend/dist
          key: dist-cf
