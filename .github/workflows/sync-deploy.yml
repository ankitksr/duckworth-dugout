name: Sync Pipeline & Deploy

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tier override (hot, warm, cool, all). Leave empty for auto.'
        required: false
        type: string
        default: ''
      panel:
        description: 'Single panel to sync (e.g. briefing, standings). Overrides tiers.'
        required: false
        type: string
        default: ''
      update_cricket_db:
        description: 'Run duckworth-mcp update+enrich before sync'
        required: false
        type: boolean
        default: false
      force:
        description: 'Bypass pipeline caches'
        required: false
        type: boolean
        default: false
  schedule:
    # Hot tier: every 30 min during match window (UTC 12-18 ~ IST 17:30-23:30)
    - cron: '*/30 12-18 * 3-5 *'

    # Hot tier: hourly off-peak (articles + wire stay fresh)
    - cron: '0 0-11,19-23 * 3-5 *'

    # Warm + cool tier: 6x daily (every 4h)
    - cron: '10 1,5,9,13,17,21 * 3-5 *'

    # DB update: daily at UTC 04:00 (IST 09:30)
    - cron: '0 4 * 3-5 *'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tiers: ${{ steps.tier.outputs.tiers }}
      panel: ${{ steps.tier.outputs.panel }}
      update_db: ${{ steps.tier.outputs.update_db }}
      force: ${{ steps.tier.outputs.force }}
    steps:
      - name: Resolve tier from inputs or schedule time
        id: tier
        run: |
          # Manual override: single panel
          if [ -n "${{ inputs.panel }}" ]; then
            echo "tiers=all" >> "$GITHUB_OUTPUT"
            echo "panel=${{ inputs.panel }}" >> "$GITHUB_OUTPUT"
            echo "update_db=${{ inputs.update_cricket_db }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Manual override: tier selection
          if [ -n "${{ inputs.tiers }}" ]; then
            echo "tiers=${{ inputs.tiers }}" >> "$GITHUB_OUTPUT"
            echo "panel=" >> "$GITHUB_OUTPUT"
            echo "update_db=${{ inputs.update_cricket_db }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "panel=" >> "$GITHUB_OUTPUT"
          echo "force=false" >> "$GITHUB_OUTPUT"

          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)

          # DB update: 04:00 UTC (IST 09:30)
          if [ "$HOUR" -eq 4 ] && [ "$MINUTE" -lt 10 ]; then
            echo "tiers=all" >> "$GITHUB_OUTPUT"
            echo "update_db=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Warm + cool: cron is :10 past at hours 1, 5, 9, 13, 17, 21.
          # Window widened to MINUTE 5..40 to absorb GitHub Actions cron
          # jitter (deliveries can lag 10–20 min). Without this, jittered
          # warm+cool runs would fall through to the hot-tier default and
          # the wire/standings/caps panels would skip their refresh.
          if [ "$MINUTE" -ge 5 ] && [ "$MINUTE" -lt 40 ]; then
            case "$HOUR" in
              1|5|9|13|17|21)
                echo "tiers=hot,warm,cool" >> "$GITHUB_OUTPUT"
                echo "update_db=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          # Default: hot tier (match window every 30 min, off-peak hourly)
          echo "tiers=hot" >> "$GITHUB_OUTPUT"
          echo "update_db=false" >> "$GITHUB_OUTPUT"

  sync-and-deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ── Python + pipeline ────────────────────────────────────────
      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install pipeline dependencies
        run: uv sync

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # ── cricket.duckdb (from duckworth-mcp) ──────────────────────
      - name: Restore cricket.duckdb cache
        uses: actions/cache/restore@v4
        with:
          path: data/cricket.duckdb
          key: cricket-db
          restore-keys: cricket-db

      - name: Bootstrap cricket.duckdb (first run)
        if: hashFiles('data/cricket.duckdb') == ''
        run: |
          uv pip install "duckworth-mcp @ git+https://github.com/ankitksr/duckworth-mcp.git"
          uv run duckworth-mcp ingest --db data/cricket.duckdb
        timeout-minutes: 5

      - name: Update cricket.duckdb
        if: needs.resolve.outputs.update_db == 'true'
        run: |
          uv pip install "duckworth-mcp @ git+https://github.com/ankitksr/duckworth-mcp.git"
          uv run duckworth-mcp update --db data/cricket.duckdb
          uv run duckworth-mcp enrich --db data/cricket.duckdb
        timeout-minutes: 3

      # ── enrichment.duckdb (articles, wire, snapshots) ────────────
      - name: Restore enrichment.duckdb cache
        uses: actions/cache/restore@v4
        with:
          path: data/enrichment.duckdb
          key: enrichment-db
          restore-keys: enrichment-db

      # ── Restore prior panel data (partial syncs layer on top) ───
      - name: Restore API data from last sync
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Seed data/war-room from cached API data
        run: |
          mkdir -p data/war-room
          cp -a frontend/public/api/ipl/war-room/*.json data/war-room/ 2>/dev/null || true

      # ── Pipeline sync ────────────────────────────────────────────
      - name: Sync pipeline (${{ needs.resolve.outputs.panel || needs.resolve.outputs.tiers }})
        env:
          CT_LLM_API_KEY: ${{ secrets.CT_LLM_API_KEY }}
          CT_LLM_VERTEX: 'true'
          CT_LLM_GCP_PROJECT: ${{ vars.CT_LLM_GCP_PROJECT }}
          CT_LLM_GCP_LOCATION: ${{ vars.CT_LLM_GCP_LOCATION }}
          CT_LLM_MODEL: ${{ vars.CT_LLM_MODEL }}
          CT_LLM_MODEL_PRO: ${{ vars.CT_LLM_MODEL_PRO }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.CT_LLM_GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.CT_LLM_GCP_LOCATION }}
          CRICKET_DB_PATH: data/cricket.duckdb
        run: |
          if [ -n "${{ needs.resolve.outputs.panel }}" ]; then
            ARGS="--panel ${{ needs.resolve.outputs.panel }}"
          else
            ARGS="--tiers ${{ needs.resolve.outputs.tiers }}"
          fi
          if [ "${{ needs.resolve.outputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          uv run python -m pipeline sync $ARGS
        timeout-minutes: 10

      # ── Cache pipeline output ───────────────────────────────────
      # GitHub Actions cache is immutable — delete then re-save to update
      - name: Update enrichment.duckdb cache
        run: |
          gh cache delete enrichment-db || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save enrichment.duckdb cache
        uses: actions/cache/save@v4
        with:
          path: data/enrichment.duckdb
          key: enrichment-db

      # Persist enrichment DB as a downloadable release asset.
      # This ensures wire history, articles, and snapshots survive
      # cache eviction and are queryable locally.
      - name: Upload enrichment.duckdb to release
        run: |
          TAG="data-snapshot"
          # Create the release if it doesn't exist (idempotent)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Data Snapshot" \
              --notes "Rolling snapshot of pipeline databases. Updated on each sync." \
              --latest=false
          # Upload (overwrite) the enrichment DB
          gh release upload "$TAG" data/enrichment.duckdb --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update API data cache
        run: |
          gh cache delete api-data || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save API data cache
        uses: actions/cache/save@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data

      - name: Update cricket.duckdb cache
        if: needs.resolve.outputs.update_db == 'true'
        run: |
          gh cache delete cricket-db || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save cricket.duckdb cache
        if: needs.resolve.outputs.update_db == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/cricket.duckdb
          key: cricket-db

      # ── Frontend build + deploy ──────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
