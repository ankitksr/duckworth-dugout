name: Live Score Update

on:
  workflow_dispatch:
  schedule:
    # Weekday evenings: 7 PM – 1 AM IST (UTC 13-19)
    - cron: '*/2 13-19 * 3-5 1-5'
    # Weekends: day + evening games (3 PM – 1 AM IST, UTC 9-19)
    - cron: '*/2 9-19 * 3-5 0,6'

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # Restore latest API data from pipeline cache
      - name: Restore API data
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Check API data exists
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          echo "No API data cache — run Sync Pipeline & Deploy first"
          exit 1

      # RSS + page crawl for rich live scores
      - name: Update live scores
        id: live
        run: |
          set +e
          OUTPUT=$(uv run python -m pipeline live-update 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then exit $RC; fi
          if echo "$OUTPUT" | grep -q "No live IPL"; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      # Save updated API data back
      - name: Update API data cache
        if: steps.live.outputs.has_updates == 'true'
        run: gh cache delete api-data || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save API data cache
        if: steps.live.outputs.has_updates == 'true'
        uses: actions/cache/save@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data

      # Build + deploy (only when live scores changed)
      - uses: actions/setup-node@v4
        if: steps.live.outputs.has_updates == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        if: steps.live.outputs.has_updates == 'true'
        with:
          path: frontend/dist

      - name: Deploy
        if: steps.live.outputs.has_updates == 'true'
        id: deploy
        uses: actions/deploy-pages@v4
