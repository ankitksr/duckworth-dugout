name: Live Score Update

on:
  workflow_dispatch:
  schedule:
    # Cron acts as chain-starter — self-chaining takes over once live.
    # Weekday evenings: 7 PM – 1 AM IST (UTC 13-19)
    - cron: '*/5 13-19 * 3-5 1-5'
    # Weekends: day + evening games (3 PM – 1 AM IST, UTC 9-19)
    - cron: '*/5 9-19 * 3-5 0,6'

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: live-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # Restore latest API data from pipeline cache
      - name: Restore API data
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Check API data exists
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          echo "No API data cache — run Sync Pipeline & Deploy first"
          exit 1

      # RSS + page crawl for rich live scores
      - name: Update live scores
        id: live
        run: |
          set +e
          OUTPUT=$(uv run python -m pipeline live-update 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then exit $RC; fi
          if echo "$OUTPUT" | grep -q "No live IPL"; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      # Live-update does NOT write back to the api-data cache.
      # scheduled-sync owns that cache — live overlays are ephemeral
      # (scores expire in minutes) and re-applied from the base cache
      # on each run. This avoids a delete/save race with scheduled-sync.

      # Build + deploy (only when live scores changed)
      - uses: actions/setup-node@v4
        if: steps.live.outputs.has_updates == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        if: steps.live.outputs.has_updates == 'true'
        with:
          path: frontend/dist

      - name: Deploy
        if: steps.live.outputs.has_updates == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      # Self-chain: trigger next run while a match is live.
      # GITHUB_TOKEN + workflow_dispatch is exempt from the anti-recursion
      # rule, so the workflow can dispatch itself. Cron is the kick-starter;
      # once live, chaining keeps updates at workflow-runtime cadence (~5 min)
      # instead of waiting for GitHub's unreliable cron scheduler.
      # 3-min cooldown prevents the chain from spinning faster than needed.
      - name: Chain next update
        if: steps.live.outputs.has_updates == 'true' && steps.deploy.outcome == 'success'
        run: |
          HOUR=$(date -u +%-H)
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          MONTH=$(date -u +%-m)

          # Stay within IPL season months
          [ "$MONTH" -lt 3 ] || [ "$MONTH" -gt 5 ] && exit 0

          IN_WINDOW=false
          if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then
            [ "$HOUR" -ge 13 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          else
            [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          fi

          if [ "$IN_WINDOW" = "true" ]; then
            echo "Match live & in window — cooldown before next chain"
            sleep 180
            echo "Chaining next update"
            gh workflow run live-update.yml
          else
            echo "Outside match window — letting cron take over"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
