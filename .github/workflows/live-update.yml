name: Live Score Update

on:
  workflow_dispatch:
  schedule:
    # Cron acts as chain-starter — self-chaining takes over once live.
    # Weekday evenings: 7 PM – 1 AM IST (UTC 13-19)
    - cron: '*/5 13-19 * 3-5 1-5'
    # Weekends: day + evening games (3 PM – 1 AM IST, UTC 9-19)
    - cron: '*/5 9-19 * 3-5 0,6'

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # Restore latest API data from pipeline cache
      - name: Restore API data
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Check API data exists
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          echo "No API data cache — run Sync Pipeline & Deploy first"
          exit 1

      # RSS + page crawl for rich live scores, and an RSS refresh of the
      # points table. has_updates fires on any change to schedule.json
      # or standings.json so Wisden catching up on a match result
      # triggers a deploy even when no match is currently live.
      - name: Update live scores + standings
        id: live
        run: |
          set +e
          api=frontend/public/api/ipl/war-room
          pre_sched=$(md5sum "$api/schedule.json" 2>/dev/null | awk '{print $1}')
          pre_stand=$(md5sum "$api/standings.json" 2>/dev/null | awk '{print $1}')

          uv run python -m pipeline live-update
          RC1=$?
          uv run python -m pipeline refresh-standings
          RC2=$?

          if [ $RC1 -ne 0 ] && [ $RC2 -ne 0 ]; then
            echo "Both live-update and refresh-standings failed"
            exit 1
          fi

          post_sched=$(md5sum "$api/schedule.json" 2>/dev/null | awk '{print $1}')
          post_stand=$(md5sum "$api/standings.json" 2>/dev/null | awk '{print $1}')

          if [ "$pre_sched" != "$post_sched" ] || [ "$pre_stand" != "$post_stand" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      # Live-update does NOT write back to the api-data cache.
      # scheduled-sync owns that cache — live overlays are ephemeral
      # (scores expire in minutes) and re-applied from the base cache
      # on each run. This avoids a delete/save race with scheduled-sync.

      # Build + deploy (only when live scores changed)
      - uses: actions/setup-node@v4
        if: steps.live.outputs.has_updates == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        env:
          ASTRO_BASE: /duckworth-dugout
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        if: steps.live.outputs.has_updates == 'true'
        with:
          path: frontend/dist

      - name: Deploy
        if: steps.live.outputs.has_updates == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      # ── Cloudflare Pages (parallel deploy — same JSON, root base path) ──
      - name: Rebuild frontend for Cloudflare (root base)
        if: steps.live.outputs.has_updates == 'true'
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.live.outputs.has_updates == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=duckworth-dugout --branch=main

      # Self-chain: keep polling during match windows.
      # Chains on two cadences:
      #   - Something changed (live scores or standings) → 3-min cooldown
      #   - In window but nothing moved → 8-min cooldown (warmup)
      # This bridges GitHub's unreliable cron gaps (~10-40 min skips).
      # cancel-in-progress: false ensures chains queue, never cancel deploys.
      - name: Chain next update
        run: |
          HOUR=$(date -u +%-H)
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          MONTH=$(date -u +%-m)

          # Stay within IPL season months
          [ "$MONTH" -lt 3 ] || [ "$MONTH" -gt 5 ] && exit 0

          IN_WINDOW=false
          if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then
            [ "$HOUR" -ge 13 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          else
            [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          fi

          if [ "$IN_WINDOW" != "true" ]; then
            echo "Outside match window — letting cron take over"
            exit 0
          fi

          HAS_LIVE="${{ steps.live.outputs.has_updates }}"
          if [ "$HAS_LIVE" = "true" ]; then
            echo "Match live — 3-min cooldown before next chain"
            sleep 180
          else
            echo "In window, no live match — 8-min warmup chain"
            sleep 480
          fi

          echo "Chaining next update"
          gh workflow run live-update.yml
        env:
          GH_TOKEN: ${{ github.token }}
