name: Live Score Update

on:
  workflow_dispatch:
  schedule:
    # Cron acts as chain-starter — self-chaining takes over once live.
    # Weekday evenings: 7 PM – 1 AM IST (UTC 13-19)
    - cron: '*/5 13-19 * 3-5 1-5'
    # Weekends: day + evening games (3 PM – 1 AM IST, UTC 9-19)
    - cron: '*/5 9-19 * 3-5 0,6'

permissions:
  actions: write   # for self-chain gh workflow run (deleted in Phase 6)
  contents: read

concurrency:
  # Shared with sync-deploy.yml so both workflows serialize on the
  # api-data cache. cancel-in-progress: false means concurrent runs
  # queue rather than cancel — we never want to drop a deploy.
  group: pipeline-deploy
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      # Restore latest API data from pipeline cache
      - name: Restore API data
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Check API data exists
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          echo "No API data cache — run Sync Pipeline & Deploy first"
          exit 1

      # Run the live tier — schedule + standings + pulse. Single command,
      # dependency-aware fetches (no article crawl, no LLM). The pipeline
      # always writes fresh JSON; we always deploy. md5-diff gating is gone
      # because runtime is low enough that always-deploy is correct + simpler.
      - name: Sync live panels
        id: live
        env:
          CRICKET_DB_PATH: data/cricket.duckdb
        run: |
          uv run --no-sync python -m pipeline sync live
          echo "has_updates=true" >> "$GITHUB_OUTPUT"

      # Live-update does NOT write back to the api-data cache.
      # scheduled-sync owns that cache — live overlays are ephemeral
      # (scores expire in minutes) and re-applied from the base cache
      # on each run. This avoids a delete/save race with scheduled-sync.

      # ── Cloudflare Pages deploy via dist overlay ──
      # The frontend fetches JSON at runtime, so HTML/JS bundles never
      # change between live cycles — we just need fresh JSON files
      # under /api/ipl/war-room/. Restore the Cloudflare-shaped dist
      # cached by sync-deploy, copy fresh JSON into it, run wrangler
      # pages deploy directly. This skips ~35s of npm ci + Astro build.
      #
      # Cache eviction is rare (sync-deploy refreshes the cache on its
      # 30-min cron). Fallback rebuild step handles the edge case where
      # the cache is genuinely missing (e.g. first run after eviction).
      - name: Restore cached dist
        id: dist-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/dist
          key: dist-cf
          restore-keys: dist-cf

      - uses: actions/setup-node@v4
        if: steps.dist-cache.outputs.cache-hit != 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Fallback rebuild if dist cache missed
        if: steps.dist-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Overlay fresh JSON into dist
        run: |
          mkdir -p frontend/dist/api/ipl/war-room
          cp -a frontend/public/api/ipl/war-room/*.json frontend/dist/api/ipl/war-room/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=duckworth-dugout --branch=main

      # Self-chain: keep polling during match windows.
      # Chains on two cadences:
      #   - Something changed (live scores or standings) → 3-min cooldown
      #   - In window but nothing moved → 8-min cooldown (warmup)
      # This bridges GitHub's unreliable cron gaps (~10-40 min skips).
      # cancel-in-progress: false ensures chains queue, never cancel deploys.
      - name: Chain next update
        run: |
          HOUR=$(date -u +%-H)
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          MONTH=$(date -u +%-m)

          # Stay within IPL season months
          [ "$MONTH" -lt 3 ] || [ "$MONTH" -gt 5 ] && exit 0

          IN_WINDOW=false
          if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then
            [ "$HOUR" -ge 13 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          else
            [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 19 ] && IN_WINDOW=true
          fi

          if [ "$IN_WINDOW" != "true" ]; then
            echo "Outside match window — letting cron take over"
            exit 0
          fi

          HAS_LIVE="${{ steps.live.outputs.has_updates }}"
          if [ "$HAS_LIVE" = "true" ]; then
            echo "Match live — 3-min cooldown before next chain"
            sleep 180
          else
            echo "In window, no live match — 8-min warmup chain"
            sleep 480
          fi

          echo "Chaining next update"
          gh workflow run live-update.yml
        env:
          GH_TOKEN: ${{ github.token }}
