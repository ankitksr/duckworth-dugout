name: Live Score Update

on:
  workflow_dispatch:
  schedule:
    # Every 2 min during match window (UTC 14-17 ~ IST 19:30-22:30)
    - cron: '*/2 14-17 * 3-5 *'

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13 + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      # Restore latest API data from pipeline cache
      - name: Restore API data
        id: api-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data
          restore-keys: api-data

      - name: Check API data exists
        if: steps.api-cache.outputs.cache-hit != 'true'
        run: |
          echo "No API data cache — run Sync Pipeline & Deploy first"
          exit 1

      # RSS-only live score update (~2 seconds)
      - name: Update live scores
        run: uv run python -m pipeline live-update

      # Save updated API data back
      - name: Update API data cache
        run: gh cache delete api-data || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save API data cache
        uses: actions/cache/save@v4
        with:
          path: frontend/public/api/ipl/war-room
          key: api-data

      # Build + deploy
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
