name: Scheduled Sync

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tier override (hot, warm, cool, all). Leave empty for auto.'
        required: false
        type: string
        default: ''
      panel:
        description: 'Single panel to sync (e.g. briefing, standings). Overrides tiers.'
        required: false
        type: string
        default: ''
      force:
        description: 'Bypass pipeline caches'
        required: false
        type: boolean
        default: false
  schedule:
    # Hot tier: every 30 min during match window (UTC 12-18 ~ IST 17:30-23:30)
    - cron: '*/30 12-18 * 3-5 *'

    # Hot tier: hourly off-peak (articles + wire stay fresh)
    - cron: '0 0-11,19-23 * 3-5 *'

    # Warm + cool tier: 6x daily (every 4h)
    - cron: '10 1,5,9,13,17,21 * 3-5 *'

    # DB update: daily at UTC 04:00 (IST 09:30)
    - cron: '0 4 * 3-5 *'

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tiers: ${{ steps.tier.outputs.tiers }}
      panel: ${{ steps.tier.outputs.panel }}
      update_db: ${{ steps.tier.outputs.update_db }}
      force: ${{ steps.tier.outputs.force }}
    steps:
      - name: Resolve tier from inputs or schedule time
        id: tier
        run: |
          # Manual override: single panel
          if [ -n "${{ inputs.panel }}" ]; then
            echo "tiers=all" >> "$GITHUB_OUTPUT"
            echo "panel=${{ inputs.panel }}" >> "$GITHUB_OUTPUT"
            echo "update_db=false" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Manual override: tier selection
          if [ -n "${{ inputs.tiers }}" ]; then
            echo "tiers=${{ inputs.tiers }}" >> "$GITHUB_OUTPUT"
            echo "panel=" >> "$GITHUB_OUTPUT"
            echo "update_db=false" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "panel=" >> "$GITHUB_OUTPUT"
          echo "force=false" >> "$GITHUB_OUTPUT"

          HOUR=$(date -u +%-H)
          MINUTE=$(date -u +%-M)

          # DB update: 04:00 UTC (IST 09:30)
          if [ "$HOUR" -eq 4 ] && [ "$MINUTE" -lt 10 ]; then
            echo "tiers=all" >> "$GITHUB_OUTPUT"
            echo "update_db=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Warm + cool: :10 past at hours 1, 5, 9, 13, 17, 21
          if [ "$MINUTE" -ge 5 ] && [ "$MINUTE" -lt 20 ]; then
            case "$HOUR" in
              1|5|9|13|17|21)
                echo "tiers=hot,warm,cool" >> "$GITHUB_OUTPUT"
                echo "update_db=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          # Default: hot tier (match window every 30 min, off-peak hourly)
          echo "tiers=hot" >> "$GITHUB_OUTPUT"
          echo "update_db=false" >> "$GITHUB_OUTPUT"

  sync:
    needs: resolve
    uses: ./.github/workflows/sync-deploy.yml
    with:
      tiers: ${{ needs.resolve.outputs.tiers }}
      panel: ${{ needs.resolve.outputs.panel }}
      update_cricket_db: ${{ needs.resolve.outputs.update_db == 'true' }}
      force: ${{ needs.resolve.outputs.force == 'true' }}
    secrets:
      CT_LLM_API_KEY: ${{ secrets.CT_LLM_API_KEY }}
